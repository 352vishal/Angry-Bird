<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Boss ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;600;800&family=Caveat:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #170524;
            background-image: radial-gradient(circle at 50% 30%, #2a0845 0%, #170524 100%);
            color: #ffffff;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            opacity: 0.3;
            z-index: 0;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            text-align: center;
            z-index: 10;
            animation: fadeIn 0.5s ease-in-out;
        }

        .active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cursive-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin: 15px 0 5px 0;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .sub-text {
            font-size: 1.1rem;
            color: #dcdde1;
            margin-bottom: 30px;
        }

        .btn-pink {
            background: #ff007f;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.5);
            transition: transform 0.2s;
        }

        .btn-pink:active {
            transform: scale(0.95);
        }

        .main-emoji {
            font-size: 6rem;
            margin-bottom: 10px;
            animation: floatEmoji 3s ease-in-out infinite;
        }

        @keyframes floatEmoji {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .progress-number {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            margin: 20px 0;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .progress-track {
            width: 80%;
            max-width: 300px;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #ff007f;
            border-radius: 10px;
            box-shadow: 0 0 10px #ff007f;
            transition: width 0.1s linear;
        }

        .warning-text {
            color: #e15f41;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 30px;
            display: none;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.7; }
            to { opacity: 1; }
        }

        .reveal-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .reveal-box {
            background: rgba(80, 20, 60, 0.6);
            border: 1px solid rgba(255, 0, 127, 0.2);
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reveal-box.opened {
            background: rgba(255, 0, 127, 0.15);
            border-color: rgba(255, 0, 127, 0.5);
            text-align: left;
            justify-content: flex-start;
        }

        .note-card {
            background: #fdf5f6;
            width: 90%;
            max-width: 350px;
            border-radius: 20px;
            padding: 30px 20px;
            color: #5a2e3a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .envelope-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .circle-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ff007f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            border: none;
            box-shadow: 0 4px 15px rgba(255,0,127,0.4);
            cursor: pointer;
            margin-bottom: 10px;
        }

        .note-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .typewriter-text {
            font-family: 'Caveat', cursive;
            font-size: 1.5rem;
            line-height: 1.4;
            text-align: center;
            min-height: 150px;
            color: #833446;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <!-- Screen 1: Intro -->
    <div id="screen1" class="screen active">
        <div class="main-emoji">🥰✨</div>
        <h1 class="cursive-title">Hey Jyoti, cutiepie</h1>
        <p class="sub-text">Do you even know how cute you are?</p>
        <button class="btn-pink" onclick="goToScreen(2); startLoading();">let's check 🤗😳</button>
    </div>

    <!-- Screen 2 & 3: Cuteness Loading -->
    <div id="screen2" class="screen">
        <p class="sub-text" style="margin-bottom: 10px; font-size: 1.2rem;">Measuring your cuteness... ⏳</p>
        <div class="progress-number" id="progNum">0%</div>
        <div class="progress-track">
            <div class="progress-fill" id="progFill"></div>
        </div>
        <div class="warning-text" id="warningTxt">⚠️ WARNING: TOO CUTE TO HANDLE</div>
        <button class="btn-pink" id="continueBtn" style="display: none;" onclick="goToScreen(3)">Continue ➔</button>
    </div>

    <!-- Screen 4: Tap to Reveal -->
    <div id="screen3" class="screen">
        <div style="font-size: 2rem; margin-bottom: 10px;">💖✨</div>
        <h1 class="cursive-title" style="font-size: 2.5rem;">Tap each one to reveal</h1>
        
        <div class="reveal-container">
            <div class="reveal-box" onclick="revealText(this, 0)">❤️</div>
            <div class="reveal-box" onclick="revealText(this, 1)">❤️</div>
            <div class="reveal-box" onclick="revealText(this, 2)">❤️</div>
        </div>
        
        <button class="btn-pink" id="nextBtn" style="display: none; margin-top: 30px;" onclick="goToScreen(4)">Next</button>
    </div>

    <!-- Screen 5: The Envelope -->
    <div id="screen4" class="screen">
        <h1 class="cursive-title">A little note for you</h1>
        
        <div class="note-card" id="envelopeView">
            <div class="envelope-icon">💌</div>
            <button class="circle-btn" onclick="openNote()">❤️</button>
            <p style="color: #a4b0be; margin-top: 10px;">Tap to open</p>
        </div>

        <div class="note-card" id="openedNoteView" style="display: none; padding: 20px;">
            <div class="note-content" id="noteContent">
                <div style="font-size: 4rem; margin-bottom: 15px;">🧸🥺</div>
                <div class="typewriter-text" id="typewriter"></div>
            </div>
        </div>
    </div>

    <script>
        // Screen Navigation
        function goToScreen(screenNumber) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if(screenNumber === 2) {
                document.getElementById('screen2').classList.add('active');
            } else if(screenNumber === 3) {
                document.getElementById('screen3').classList.add('active');
            } else if(screenNumber === 4) {
                document.getElementById('screen4').classList.add('active');
            }
        }

        // Loading Animation
        function startLoading() {
            let pct = 0;
            const numEl = document.getElementById('progNum');
            const fillEl = document.getElementById('progFill');
            const warnEl = document.getElementById('warningTxt');
            const btnEl = document.getElementById('continueBtn');

            let interval = setInterval(() => {
                pct += 1;
                numEl.innerText = pct + '%';
                
                if(pct <= 100) {
                    fillEl.style.width = pct + '%';
                }

                if(pct >= 120) {
                    clearInterval(interval);
                    warnEl.style.display = 'block';
                    btnEl.style.display = 'inline-block';
                }
            }, 30);
        }

        // Tap to Reveal Text with genuine guilt
        const hiddenMessages = [
            "I know gussa ab khatam ho gaya hai... par mera guilt abhi bhi wahi hai. 🥺💖",
            "Raat ko jab tumhe meri sabse zyada zaroorat thi, main paas nahi tha... I really hate myself for that. 😔",
            "Thank you apne is stupid 'Employee' ko samajhne aur maaf karne ke liye. 🫡✨"
        ];
        
        let revealedCount = 0;

        function revealText(element, index) {
            if(!element.classList.contains('opened')) {
                element.classList.add('opened');
                element.innerHTML = hiddenMessages[index];
                revealedCount++;

                if(revealedCount === 3) {
                    document.getElementById('nextBtn').style.display = 'inline-block';
                }
            }
        }

        // Final Message Text focusing on guilt and missing her anxious moment
        const finalMessage = "Hey Jyoti. ❤️ I know humari subah aaram se baat ho gayi hai, but I still needed to say a proper sorry. Mujhe sach mein bahut guilt feel ho raha hai ki kal raat jab tumhe anxiety ho rahi thi, tab main so gaya. I should have been there for you, holding you and listening to you. 😔 Please mere is bewakoof employee wale behavior ko bhool jana. I promise aage se I will always be awake for you. Ab jaldi se apna lunch properly finish karo, you deserve to smile today! 🥰🍱";
        
        function openNote() {
            document.getElementById('envelopeView').style.display = 'none';
            document.getElementById('openedNoteView').style.display = 'flex';
            document.getElementById('noteContent').style.display = 'flex';
            
            typeWriter();
        }

        let i = 0;
        function typeWriter() {
            if (i < finalMessage.length) {
                document.getElementById("typewriter").innerHTML += finalMessage.charAt(i);
                i++;
                setTimeout(typeWriter, 40);
            }
        }
    </script>
</body>
</html>
