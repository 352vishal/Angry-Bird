                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    /* Bottom button */
.bottom-btn-container {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: none;
  justify-content: center;
  align-items: center;
  }
  
  .bottom-btn-container.visible {
  display: flex;
  }
  
  /* Heart button positioning fix for Page 1 */
  .page1-heart {
    margin: 0 auto;
  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .bottom-btn-container.visible {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      opacity: 1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            pointer-events: auto;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
.ready-btn {
  padding: 15px 50px;
  font-size: 1.4rem;
  font-weight: bold;
  color: white;
  background: linear-gradient(145deg, #ec4899, #d63384);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(214, 51, 132, 0.4);
  transition: all 0.3s ease;
  animation: btnPulse 2s infinite;
  }
  
  .ready-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(214, 51, 132, 0.5);
  }
  
  /* Heart shaped button */
  .heart-btn {
      position: relative;
      width: 120px;
      height: 110px;
      background: linear-gradient(145deg, #ec4899, #d63384);
      transform: rotate(-45deg);
      cursor: pointer;
      border: none;
      box-shadow: 0 6px 25px rgba(214, 51, 132, 0.5);
      transition: all 0.3s ease;
      animation: heartPulse 1.5s infinite;
  }
  
  .heart-btn::before,
  .heart-btn::after {
      content: '';
      position: absolute;
      width: 120px;
      height: 110px;
      background: linear-gradient(145deg, #ec4899, #d63384);
      border-radius: 50%;
  }
  
  .heart-btn::before {
      top: -55px;
      left: 0;
  }
  
  .heart-btn::after {
      left: 55px;
      top: 0;
  }
  
  .heart-btn-text {
      position: absolute;
      transform: rotate(45deg);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      text-align: center;
      z-index: 10;
      width: 100px;
      top: 30px;
      left: 10px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
  }
  
  .heart-btn:hover {
      transform: rotate(-45deg) scale(1.1);
      box-shadow: 0 10px 35px rgba(214, 51, 132, 0.6);
  }
  
  @keyframes heartPulse {
      0%, 100% { transform: rotate(-45deg) scale(1); }
      50% { transform: rotate(-45deg) scale(1.05); }
  }
  
  /* Flower rain effect */
  .flower-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
  }
  
  .flower {
      position: absolute;
      top: -50px;
      font-size: 30px;
      animation: flowerFall linear forwards;
      opacity: 0.9;
  }
  
  @keyframes flowerFall {
      0% {
          transform: translateY(0) rotate(0deg) scale(1);
          opacity: 1;
      }
      25% {
          transform: translateY(25vh) rotate(90deg) scale(1.1);
      }
      50% {
          transform: translateY(50vh) rotate(180deg) scale(0.9);
      }
      75% {
          transform: translateY(75vh) rotate(270deg) scale(1.1);
      }
      100% {
          transform: translateY(110vh) rotate(360deg) scale(1);
          opacity: 0.6;
      }
  }
  
  @keyframes btnPulse {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        0%, 100% { box-shadow: 0 6px 20px rgba(214, 51, 132, 0.4); }

  .not-ready-chain {
      display: flex;
      flex-direction: column;

      gap: 10px;
      margin-top: 20px;
      width: 100%;
      max-width: 350px;
  }
  
  .chain-btn {
      padding: 12px 25px;
      font-size: 1rem;
      font-weight: bold;
      color: white;
      border: none;
      border-radius: 30px;

      animation: chainSlideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  
  .chain-btn:hover {
      transform: scale(1.05);
  }
  
  @keyframes chainSlideIn {
      0% { transform: translateX(-100px) scale(0.5); opacity: 0; }
      60% { transform: translateX(10px) scale(1.05); }
      100% { transform: translateX(0) scale(1); opacity: 1; }
  }
  
  /* Popup styles */
  .popup-overlay {
      display: none;

      left: 0;
      width: 100%;
      height: 100%;

  }

      text-align: center;
      max-width: 90%;
      animation: popupBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  
  @keyframes popupBounce {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
  }

      font-weight: bold;
      margin-bottom: 20px;
      line-height: 1.5;
  }

  }

function goToPage2() {

  }
  
// Heart button click - trigger flower rain and go to page 2
function handleHeartClick() {
  startFlowerRain();
  setTimeout(() => {
  goToPage2();
  }, 500);
  }
  
// Page 1 heart button - flower rain then navigate after animation finishes
function handlePage1HeartClick() {
  startFlowerRain();

  // Flower rain effect
function startFlowerRain() {
  const flowers = ['🌸', '🌺', '🌹', '🌷', '💐', '🌻', '🌼', '💮', '🏵️', '🌾'];
  const container = document.createElement('div');
  container.className = 'flower-container';
  container.id = 'flowerContainer';
  document.body.appendChild(container);
  
  // Create initial burst of flowers
  for (let i = 0; i < 50; i++) {
    setTimeout(() => createFlower(container, flowers), i * 50);
  }
  
  // Continue creating flowers
  const interval = setInterval(() => {
    for (let i = 0; i < 3; i++) {
      createFlower(container, flowers);
    }
  }, 100);
  
  // Stop after 5 seconds
  setTimeout(() => {
    clearInterval(interval);
    setTimeout(() => {
      if (container.parentNode) {
        container.remove();
      }
    }, 3000);
  }, 5000);
}

function createFlower(container, flowers) {
  const flower = document.createElement('div');
  flower.className = 'flower';
  flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
  flower.style.left = Math.random() * 100 + 'vw';
  flower.style.fontSize = (Math.random() * 20 + 20) + 'px';
  flower.style.animationDuration = (Math.random() * 3 + 3) + 's';
  flower.style.animationDelay = Math.random() * 0.5 + 's';
  container.appendChild(flower);
  
  // Remove flower after animation
  setTimeout(() => {
    if (flower.parentNode) {
      flower.remove();
    }
  }, 7000);
}

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Show success
function showSuccess() {
  document.getElementById('page2').classList.remove('active');
  document.getElementById('page3').classList.add('active');
  }
  
  // Not ready chain messages
  const notReadyMessages = [
    { text: "yar or kitna time chahiye soch lo ek bar", emoji: "🤔" },
    { text: "maan jao yar", emoji: "🥺" },
    { text: "tum q nahi haa bol rahi ho", emoji: "😭" },
    { text: "please yar", emoji: "💔" },
    { text: "ek chance do", emoji: "🙏" },
    { text: "mai wait karunga", emoji: "⏳" },
    { text: "tum meri zindagi ho", emoji: "❤️" },
    { text: "bina tumhare kuch nahi", emoji: "😢" },
    { text: "soch lo achi tarah", emoji: "💭" },
    { text: "ab to haa bol do", emoji: "🌹" },
    { text: "last chance hai tumhara", emoji: "⚠️" },
    { text: "ab koi option nahi", emoji: "🔥" }
  ];
  
  const chainColors = [
    'linear-gradient(145deg, #8b5cf6, #7c3aed)',
    'linear-gradient(145deg, #ec4899, #db2777)',
    'linear-gradient(145deg, #3b82f6, #2563eb)',
    'linear-gradient(145deg, #10b981, #059669)',
    'linear-gradient(145deg, #f59e0b, #d97706)',
    'linear-gradient(145deg, #ef4444, #dc2626)',
    'linear-gradient(145deg, #6366f1, #4f46e5)',
    'linear-gradient(145deg, #14b8a6, #0d9488)',
    'linear-gradient(145deg, #f97316, #ea580c)',
    'linear-gradient(145deg, #a855f7, #9333ea)',
    'linear-gradient(145deg, #06b6d4, #0891b2)',
    'linear-gradient(145deg, #e11d48, #be123c)'
  ];
  
  let notReadyStep = 0;
  
  function handleNotReady() {
    document.getElementById('notReadyBtn').style.display = 'none';
    showNextChainMessage();
  }
  
  function showNextChainMessage() {
    if (notReadyStep >= notReadyMessages.length) {
      // Show popup and go back to home
      document.getElementById('popupOverlay').classList.add('active');
      return;
    }
    
    const chain = document.getElementById('notReadyChain');
    const msg = notReadyMessages[notReadyStep];
    
    // Remove previous button if exists
    const prevBtn = chain.querySelector('.chain-btn');
    if (prevBtn) {
      prevBtn.remove();
    }
    
    // Create new button
    const btn = document.createElement('button');
    btn.className = 'chain-btn';
    btn.style.background = chainColors[notReadyStep];
    btn.innerHTML = msg.text + ' <span style="margin-left: 8px;">' + msg.emoji + '</span>';
    btn.onclick = function() {
      notReadyStep++;
      showNextChainMessage();
    };
    
    chain.appendChild(btn);
  }
  
  function closePopupAndGoHome() {
    document.getElementById('popupOverlay').classList.remove('active');
    // Reset page 2 state
    document.getElementById('page2').classList.remove('active');
    document.getElementById('page1').classList.add('active');
    // Reset not ready chain
    notReadyStep = 0;
    document.getElementById('notReadyChain').innerHTML = '';
    document.getElementById('notReadyBtn').style.display = 'flex';
    // Reset No button
    const noBtn = document.getElementById('noBtn');
    noBtn.style.display = 'block';
    noBtn.style.transform = 'translate(0, 0)';
    document.getElementById('disappearedMsg').classList.remove('visible');
    // Reset background
    document.body.style.background = 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%)';
  }
  
  // Initialize
  createFloatingHearts();
  createGiftBoxes();
  </script>
