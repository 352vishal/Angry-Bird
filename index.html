<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be Mine? ❤️</title>
    <style>
        /* CSS Advanced Reset & Custom Properties */
        :root {
            --primary-love: #ff4d6d;
            --secondary-love: #ff758f;
            --dark-love: #c9184a;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-light: #ffffff;
            --shadow-premium: 0 8px 32px 0 rgba(255, 77, 109, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            overflow: hidden;
            position: relative;
        }

        /* Floating Hearts Container */
        #hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .heart-particle {
            position: absolute;
            color: var(--primary-love);
            font-size: 20px;
            animation: floatUp linear infinite;
            opacity: 0.7;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main Dynamic Card with Glassmorphism */
        .proposal-card {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 3rem 2rem;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: var(--shadow-premium);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animated Big Heart */
        .main-heart {
            font-size: 5rem;
            display: inline-block;
            animation: pulse 1.2s infinite ease-in-out alternate;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px var(--primary-love));
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        h1 {
            color: #4a0010;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        p {
            color: #5c001b;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        /* Buttons Container & Styling */
        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 60px;
            position: relative;
        }

        .btn {
            padding: 0.8rem 2.2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-yes {
            background: linear-gradient(45deg, var(--primary-love), var(--secondary-love));
            color: var(--text-light);
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }

        .btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.6);
        }

        .btn-no {
            background: #ffffff;
            color: var(--dark-love);
            border: 2px solid var(--primary-love);
            position: relative;
            z-index: 100;
        }

        /* Success State View (Hidden Initially) */
        .success-view {
            display: none;
        }

        .success-view h1 {
            color: var(--dark-love);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .couple-img-placeholder {
            margin: 1.5rem 0;
            font-size: 4rem;
        }
    </style>
</head>
<body>

    <!-- Background Particle Layer -->
    <div id="hearts-container"></div>

    <!-- Main Dynamic Card -->
    <div class="proposal-card" id="card">
        <!-- Initial Proposal Screen -->
        <div class="initial-view" id="initial-view">
            <span class="main-heart">❤️</span>
            <h1>Hey Gorgeous!</h1>
            <p>Mene jab se tumko dekha hai, meri life ekdum badal gayi hai. I want to spend my forever with you. <br><strong>Will you marry me?</strong></p>
            
            <div class="btn-group">
                <button class="btn btn-yes" id="yesBtn">Yes! 💍</button>
                <button class="btn btn-no" id="noBtn">No 🥺</button>
            </div>
        </div>

        <!-- Success Screen -->
        <div class="success-view" id="success-view">
            <div class="couple-img-placeholder">💖👩‍❤️‍👨💖</div>
            <h1>Yaaayyy! I Love You!</h1>
            <p>Aapne haan keh diya! Yeh meri life ka sabse khushi ka din hai. I promise to keep you happy forever! 👑✨</p>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const initialView = document.getElementById('initial-view');
        const successView = document.getElementById('success-view');
        const heartsContainer = document.getElementById('hearts-container');

        // 1. Dynamic Background Floating Hearts Generator
        function createHeartParticle() {
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            heart.innerHTML = '❤️';
            
            // Random positions and animations
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's'; // 3 to 6s
            heart.style.fontSize = Math.random() * 15 + 15 + 'px'; // 15px to 30px
            
            heartsContainer.appendChild(heart);

            // Clean up old hearts to avoid memory leak
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        // Generate background hearts continuously
        setInterval(createHeartParticle, 300);

        // 2. The Clever Interactive 'No' Button Logic
        function moveNoButton() {
            // Get card dimensions so button stays within or around visual bounds
            const card = document.getElementById('card');
            const cardRect = card.getBoundingClientRect();
            
            // Generate semi-random positions
            const randomX = (Math.random() - 0.5) * 250; // Max 125px left or right
            const randomY = (Math.random() - 0.5) * 150; // Max 75px up or down

            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
            noBtn.style.transition = "transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        }

        // Trigger on both mouse hover & touch devices
        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents mobile ghost clicks
            moveNoButton();
        });

        // 3. Dynamic Audio generator (No external files needed!)
        function playSuccessSound() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            
            // Melody sequence notes (frequencies) for a happy celebration sound
            const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99]; 
            notes.forEach((freq, index) => {
                setTimeout(() => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.4);
                }, index * 100);
            });
        }

        // 4. Yes Button Click Logic (State Switch)
        yesBtn.addEventListener('click', () => {
            // Switch UI states smoothly
            initialView.style.display = 'none';
            successView.style.display = 'block';
            
            // Play procedural dynamic sound
            playSuccessSound();

            // Burst intense celebration hearts
            for(let i=0; i<30; i++) {
                setTimeout(createHeartParticle, i * 50);
            }
        });
    </script>
</body>
</html>
